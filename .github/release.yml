changelog:
  exclude:
    labels:
      - ignore-for-release
      - duplicate
      - invalid
      - wontfix
    authors:
      - dependabot
  categories:
    - title: "💥 Breaking changes"
      labels:
        - breaking
        - breaking-change
    - title: "🚀 Features"
      labels:
        - feature
        - enhancement
    - title: "🐛 Bug fixes"
      labels:
        - bug
        - fix
    - title: "⚡ Performance"
      labels:
        - performance
    - title: "🔒 Security"
      labels:
        - security
    - title: "📚 Documentation"
      labels:
        - documentation
        - docs
    - title: "🧪 Tests"
      labels:
        - tests
        - test
    - title: "🏗️ Build & CI"
      labels:
        - ci
        - build
    - title: "📦 Dependencies"
      labels:
        - dependencies
        - deps
    - title: "🔧 Maintenance"
      labels:
        - chore
        - refactor
    - title: "Other changes"
      labels:
        - "*"
