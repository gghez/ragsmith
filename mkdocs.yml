site_name: ragsmith
site_description: Async RAG toolkit on Postgres/pgvector and Voyage AI.
site_url: https://gghez.github.io/ragsmith/
repo_url: https://github.com/gghez/ragsmith
repo_name: gghez/ragsmith

theme:
  name: material
  features:
    - navigation.indexes
    - navigation.sections
    - content.code.copy
  palette:
    - scheme: default
      primary: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

plugins:
  - search
  - gen-files:
      scripts:
        - scripts/gen_ref_pages.py
  - literate-nav:
      nav_file: SUMMARY.md
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            show_signature_annotations: true
            separate_signature: true
            merge_init_into_class: true

nav:
  - Home: index.md
  - API Reference: api/
